<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daurah Quranic 2026 - Tasmik Digital Pro</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e5128">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2026.3">

    <script src="https://cdn.jsdelivr.net/npm/hjson@3.2.2/bundle/hjson.min.js"></script>
</head>
<body class="no-scroll">

    <a href="index.html" class="btn-home-float" title="Utama">
        <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
    </a>

    <div class="pentashih-float" onclick="toggleUstaz()" id="pentashihBtn">
        <small id="ustazNameDisplay">USTAZ AIMAN</small>
        <i class="fa-solid fa-circle-user"></i>
    </div>

    <div class="main-card">
        <div class="scroll-content">
            
            <div class="section-group">
                <label class="form-label"><i class="fa-solid fa-venus-mars"></i> Jantina Peserta</label>
                <select id="jantina" class="modern-input" onchange="renderPesertaPicker()">
                    <option value="LELAKI">LELAKI</option>
                    <option value="PEREMPUAN">PEREMPUAN</option>
                </select>
            </div>

            <div class="section-group">
                <label class="form-label"><i class="fa-solid fa-user-graduate"></i> Nama Pelajar</label>
                <div id="peserta-picker" class="wheel-picker">
                    <div id="peserta-wrapper">
                        </div>
                </div>
            </div>

            <div class="section-group">
                <label class="form-label"><i class="fa-solid fa-book-quran"></i> Pilih Surah</label>
                <div id="surah-picker" class="wheel-picker">
                    <div id="surah-wrapper">
                        </div>
                </div>
            </div>

            <div class="section-group">
                <label class="form-label"><i class="fa-solid fa-file-lines"></i> Muka Surat</label>
                <input type="number" id="muka" class="modern-input" placeholder="000" inputmode="numeric">
            </div>

            <div class="row-ayat">
                <div class="flex-grow-1">
                    <label class="form-label"><i class="fa-solid fa-star"></i> Tajwid</label>
                    <div id="tajwid-picker" class="wheel-picker rating-picker">
                        <div id="tajwid-wrapper"></div>
                    </div>
                </div>
                <div class="flex-grow-1">
                    <label class="form-label"><i class="fa-solid fa-microphone-lines"></i> Fasohah</label>
                    <div id="fasohah-picker" class="wheel-picker rating-picker">
                        <div id="fasohah-wrapper"></div>
                    </div>
                </div>
            </div>

            <div class="section-group mt-3">
                <label class="form-label"><i class="fa-solid fa-pen-fancy"></i> Catatan Pentashih</label>
                <textarea id="catatan" class="modern-input" rows="2" placeholder="Ulasan kemajuan..."></textarea>
            </div>

            <div id="audio-container" class="mt-3 text-center d-none">
                <div class="divider"></div>
                <label class="form-label">🎧 Semak Rakaman Suara</label>
                <audio id="audioPlayback" class="w-100" controls></audio>
            </div>

        </div>
    </div>

    <div class="action-buttons">
        <button id="recordBtn" class="btn-record" onclick="toggleRecording()" title="Rakam Suara">
            <i class="fa-solid fa-microphone"></i>
        </button>

        <button class="fab-send" id="submitBtn" onclick="hantarTasmik()" title="Hantar Rekod">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <div id="statusOverlay" class="d-none">
        <div class="spinner-border text-light" role="status"></div>
    </div>

    <script>
        // PWA Implementation
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=2026.3')
                    .then(reg => console.log("PWA: Service Worker Registered"))
                    .catch(err => console.log("PWA: Service Worker Failed", err));
            });
        }
    </script>
    <script src="script.js?v=2026.3"></script>

</body>
</html>
