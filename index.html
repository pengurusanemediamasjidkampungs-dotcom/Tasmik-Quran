<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daurah Quranic 2026 - Digital Tasmik</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e5128">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2026.1">

    <script src="https://cdn.jsdelivr.net/npm/hjson@3.2.2/bundle/hjson.min.js"></script>
</head>
<body class="no-scroll">

    <a href="index.html" class="btn-home-float" title="Kembali">
        <img src="logo.png" alt="Logo">
    </a>

    <div class="pentashih-float" onclick="toggleUstaz()" id="pentashihBtn">
        <small id="ustazNameDisplay">USTAZ AIMAN</small>
    </div>

    <div class="main-card">
        <div class="scroll-content">
            
            <div class="section-group">
                <label class="form-label">👥 Jantina Peserta</label>
                <select id="jantina" class="modern-input" onchange="renderPesertaPicker()">
                    <option value="LELAKI">LELAKI</option>
                    <option value="PEREMPUAN">PEREMPUAN</option>
                </select>
            </div>

            <div class="section-group">
                <label class="form-label">👤 Nama Pelajar</label>
                <div id="peserta-picker" class="wheel-picker">
                    <div id="peserta-wrapper">
                        </div>
                </div>
            </div>

            <div class="section-group">
                <label class="form-label">📖 Pilih Surah</label>
                <div id="surah-picker" class="wheel-picker">
                    <div id="surah-wrapper">
                        </div>
                </div>
            </div>

            <div class="section-group">
                <label class="form-label">📄 Muka Surat</label>
                <input type="number" id="muka" class="modern-input" placeholder="Contoh: 604" inputmode="numeric">
            </div>

            <div class="row-ayat">
                <div class="flex-grow-1 me-2">
                    <label class="form-label">✨ Tajwid</label>
                    <div id="tajwid-picker" class="wheel-picker rating-picker">
                        <div id="tajwid-wrapper">
                            </div>
                    </div>
                </div>
                <div class="flex-grow-1 ms-2">
                    <label class="form-label">🗣️ Fasohah</label>
                    <div id="fasohah-picker" class="wheel-picker rating-picker">
                        <div id="fasohah-wrapper">
                            </div>
                    </div>
                </div>
            </div>

            <div class="section-group mt-3">
                <label class="form-label">✍️ Catatan Pentashih (Opsional)</label>
                <textarea id="catatan" class="modern-input" rows="2" placeholder="Tulis ulasan di sini..."></textarea>
            </div>

            <div id="audio-container" class="mt-3 text-center d-none">
                <label class="form-label">🎧 Semak Rakaman Suara</label>
                <audio id="audioPlayback" class="w-100" controls></audio>
            </div>

        </div>
    </div>

    <div class="action-buttons">
        <button id="recordBtn" class="btn-record" onclick="toggleRecording()" title="Rakam Suara">
            <i class="fa-solid fa-microphone"></i>
        </button>

        <button class="fab-send" id="submitBtn" onclick="hantarTasmik()" title="Hantar Rekod">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=2026')
                    .then(reg => console.log("SW: PWA Ready", reg.scope))
                    .catch(err => console.log("SW: Failed", err));
            });
        }
    </script>
    <script src="script.js?v=2026.1"></script>

</body>
</html>
