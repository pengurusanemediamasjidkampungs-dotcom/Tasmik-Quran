<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TASMIK DIGITAL 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hjson@3.2.2/bundle/hjson.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #3b82f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px 15px 100px 15px; 
        }

        .container { max-width: 500px; margin: 0 auto; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-weight: 800; font-size: 22px; margin: 0; color: var(--primary); }
        .header p { font-size: 13px; opacity: 0.7; margin: 5px 0 0 0; }

        /* Form Card */
        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .section-group { margin-bottom: 20px; }
        .form-label { 
            display: block; 
            font-weight: 800; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        /* Wheel Picker Style */
        .wheel-container {
            background: #f1f5f9;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
        }
        .wheel-picker {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 10px 5px;
            gap: 10px;
            scrollbar-width: none;
        }
        .wheel-picker::-webkit-scrollbar { display: none; }
        
        .wheel-item {
            flex: 0 0 auto;
            scroll-snap-align: center;
            padding: 12px 20px;
            background: white;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            transition: 0.3s;
            text-align: center;
            min-width: 80px;
        }
        .wheel-item.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* Grid System for Inputs */
        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modern-input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-family: inherit;
            font-weight: 600;
            font-size: 15px;
            background: #fcfcfc;
        }
        .modern-input:focus { outline: none; border-color: var(--primary); }

        /* Range Input */
        .range-box { display: flex; align-items: center; gap: 8px; }
        .range-box input { text-align: center; }

        /* Floating Pentashih Button */
        .pentashih-float {
            position: fixed;
            top: 20px;
            right: 15px;
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 10px;
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
            cursor: pointer;
            z-index: 100;
            text-align: center;
        }

        /* Audio Section */
        .audio-card {
            background: #eff6ff;
            border: 2px dashed #bfdbfe;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .record-btn {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: none;
            background: #ef4444;
            color: white;
            font-size: 20px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .record-btn.recording { animation: pulse 1.5s infinite; background: #991b1b; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Submit Button */
        .btn-submit {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 470px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(37,99,235,0.4);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-submit:disabled { background: #94a3b8; }

        .d-none { display: none; }
    </style>
</head>
<body>

    <div class="pentashih-float" onclick="toggleUstaz()">
        <small>PENTASHIH<br>AIMAN</small>
    </div>

    <div class="container">
        <div class="header">
            <h1>TASMIK DIGITAL</h1>
            <p>Sistem Rekod Daurah Al-Quran 2026</p>
        </div>

        <div class="card">
            <div class="section-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label class="form-label">PILIH PESERTA</label>
                    <select id="jantina" style="border:none; background:none; font-weight:800; color:var(--primary); font-size:11px;">
                        <option value="LELAKI">♂️ LELAKI</option>
                        <option value="PEREMPUAN">♀️ PEREMPUAN</option>
                    </select>
                </div>
                <div class="wheel-container">
                    <div id="peserta-wrapper" class="wheel-picker"></div>
                </div>
            </div>

            <div class="section-group">
                <label class="form-label">TAHAP SILIBUS (1-6)</label>
                <div class="wheel-container">
                    <div id="tahap-wrapper" class="wheel-picker"></div>
                </div>
            </div>

            <div class="section-group">
                <label class="form-label">SURAH</label>
                <div class="wheel-container">
                    <div id="surah-wrapper" class="wheel-picker"></div>
                </div>
            </div>

            <div class="row-grid">
                <div class="section-group">
                    <label class="form-label">JENIS BACAAN</label>
                    <select id="jenis_bacaan" class="modern-input">
                        <option value="Talaqqi">Talaqqi</option>
                        <option value="Hafazan Baru">Hafazan Baru</option>
                        <option value="Ulangan">Ulangan</option>
                    </select>
                </div>
                <div class="section-group">
                    <label class="form-label">MUKA SURAT</label>
                    <input type="number" id="muka" class="modern-input" placeholder="M/S">
                </div>
            </div>

            <div class="section-group">
                <label class="form-label">JULAT AYAT (MULA - AKHIR)</label>
                <div class="range-box">
                    <input type="number" id="ayat_mula" class="modern-input" placeholder="Mula">
                    <span style="font-weight: 800; color: #cbd5e1;">-</span>
                    <input type="number" id="ayat_akhir" class="modern-input" placeholder="Akhir">
                </div>
            </div>

            <div class="row-grid">
                <div class="section-group">
                    <label class="form-label">TAJWID</label>
                    <div id="tajwid-wrapper" class="wheel-picker wheel-container"></div>
                </div>
                <div class="section-group">
                    <label class="form-label">FASOHAH</label>
                    <div id="fasohah-wrapper" class="wheel-picker wheel-container"></div>
                </div>
            </div>

            <div class="section-group">
                <label class="form-label">CATATAN / ULASAN</label>
                <textarea id="catatan" class="modern-input" rows="2" placeholder="Tulis ulasan jika ada..."></textarea>
            </div>

            <div class="audio-card">
                <button type="button" id="recordBtn" class="record-btn" onclick="toggleRecording()">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <div id="audio-container" class="d-none">
                    <audio id="audioPlayback" controls style="width: 100%; height: 35px;"></audio>
                </div>
                <p id="recordStatus" style="font-size: 11px; font-weight: 800; margin-top: 5px; color: #ef4444;">KLIK UNTUK RAKAM SUARA</p>
            </div>
        </div>

        <button id="submitBtn" class="btn-submit" onclick="hantarTasmik()">
            <i class="fa-solid fa-paper-plane"></i> HANTAR REKOD
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
